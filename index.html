<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Talks Today</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    .search-container {
      margin-top: 1rem;
    }

    #searchInput {
      padding: 0.5rem;
      width: 300px;
    }

    #searchButton {
      padding: 0.5rem 1rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    #schedule-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }

    .talk {
      background-color: #fff;
      border-left: 5px solid #4CAF50;
      margin-bottom: 1.5rem;
      padding: 1rem;
    }

    .talk h2 {
      margin-top: 0;
    }

    .talk .time {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .talk .speakers {
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    .talk .categories span {
      background-color: #eee;
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
      margin-right: 0.5rem;
      font-size: 0.9rem;
    }

    .break {
      text-align: center;
      font-style: italic;
      margin-bottom: 1.5rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tech Talks Today</h1>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Enter category to search...">
      <button id="searchButton">Search</button>
    </div>
  </header>
  <main id="schedule-container">
    <!-- Schedule will be dynamically generated here -->
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scheduleContainer = document.getElementById('schedule-container');
      const searchButton = document.getElementById('searchButton');
      const searchInput = document.getElementById('searchInput');
      const talksData = [
        {
          "title": "The Future of JavaScript Frameworks",
          "speakers": ["Jane Doe"],
          "categories": ["JavaScript", "Web Development"],
          "duration": 60,
          "description": "A deep dive into the trends and future of popular JavaScript frameworks like React, Vue, and Angular."
        },
        {
          "title": "Building Scalable APIs with Node.js",
          "speakers": ["John Smith"],
          "categories": ["Node.js", "API", "Backend"],
          "duration": 60,
          "description": "Learn how to design and build RESTful APIs that can handle high traffic and scale effectively."
        },
        {
          "title": "Mastering CSS Grid and Flexbox",
          "speakers": ["Alice Johnson", "Bob Brown"],
          "categories": ["CSS", "Frontend"],
          "duration": 60,
          "description": "A hands-on workshop to master the modern CSS layout techniques of Grid and Flexbox."
        },
        {
          "title": "Introduction to Machine Learning with Python",
          "speakers": ["Charlie Davis"],
          "categories": ["Python", "Machine Learning"],
          "duration": 60,
          "description": "An introductory session on the fundamentals of machine learning using Python and popular libraries like Scikit-learn."
        },
        {
          "title": "DevOps for Dummies",
          "speakers": ["Diana Miller"],
          "categories": ["DevOps", "CI/CD"],
          "duration": 60,
          "description": "A beginner-friendly guide to DevOps principles, continuous integration, and continuous deployment."
        },
        {
          "title": "The Art of Debugging",
          "speakers": ["Eve Williams"],
          "categories": ["General", "Debugging"],
          "duration": 60,
          "description": "Learn effective strategies and tools for debugging code across different programming languages and environments."
        }
      ];

      const renderSchedule = (talks) => {
        scheduleContainer.innerHTML = '';
        let currentTime = 10 * 60; // 10:00 AM in minutes

        talks.forEach((talk, index) => {
          const startTime = `${Math.floor(currentTime / 60).toString().padStart(2, '0')}:${(currentTime % 60).toString().padStart(2, '0')}`;
          const endTime = `${Math.floor((currentTime + talk.duration) / 60).toString().padStart(2, '0')}:${((currentTime + talk.duration) % 60).toString().padStart(2, '0')}`;

          const talkElement = document.createElement('div');
          talkElement.classList.add('talk');
          talkElement.innerHTML = `
            <div class="time">${startTime} - ${endTime}</div>
            <h2>${talk.title}</h2>
            <div class="speakers">By: ${talk.speakers.join(', ')}</div>
            <div class="categories">Categories: ${talk.categories.map(cat => `<span>${cat}</span>`).join('')}</div>
            <p>${talk.description}</p>
          `;
          scheduleContainer.appendChild(talkElement);

          currentTime += talk.duration;

          if (index === 2) { // Lunch break after the 3rd talk
            const breakElement = document.createElement('div');
            breakElement.classList.add('break');
            breakElement.textContent = '01:00 PM - 02:00 PM: Lunch Break';
            scheduleContainer.appendChild(breakElement);
            currentTime += 60; // 1 hour lunch break
          } else if (index < talks.length - 1) {
            currentTime += 10; // 10 minute transition
          }
        });
      };

      searchButton.addEventListener('click', () => {
        const searchTerm = searchInput.value.trim().toLowerCase();
        if (searchTerm) {
          const filteredTalks = talksData.filter(talk =>
            talk.categories.some(cat => cat.toLowerCase().includes(searchTerm))
          );
          renderSchedule(filteredTalks);
        } else {
          renderSchedule(talksData);
        }
      });

      renderSchedule(talksData);
    });
  </script>
</body>
</html>
